name: CI

on:
  push:
    branches: [main, dev, 'feat/**', 'fix/**', 'chore/**']
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.24'

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.5

      - run: go build ./cmd/aperture-announce
      - run: go test ./...
      - name: Race detector (packages without go-nostr relay calls)
        run: go test -race ./internal/config/ ./internal/key/ ./internal/validate/
      - run: go vet ./...
      - run: golangci-lint run ./...
